name: Krishak Bandhu Automation

on:
  schedule:
    # প্রতিদিন দুপুর ১২:৩০ UTC (অর্থাৎ ভারতীয় সময় সন্ধ্যা ৬:৩০)
    - cron: '30 12 * * *'
  workflow_dispatch: # এটি থাকলে আপনি নিজেও যখন ইচ্ছা বাটন টিপে রান করতে পারবেন

# Node.js ওয়ার্নিং পুরোপুরি বন্ধ করার জন্য এটি রাখা হলো
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4 # আপনার স্টাইল ঠিক রেখে শুধু আপডেট ভার্সন দেওয়া হলো

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Libraries
        # আপনি যদি requirements.txt ব্যবহার করতে না চান, তবে সরাসরি নিচে এভাবে লাইব্রেরি ইনস্টল করতে পারেন
        run: pip install requests beautifulsoup4

      - name: Run Automation Script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python main.py # আপনার পাইথন ফাইলের নাম main.py রাখতে হবে
        
