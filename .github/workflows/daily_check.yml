name: Daily Farmer Search Check

on:
  schedule:
    # This runs at 00:00 UTC every day (Approx 5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      # UPDATED: Changed from v3 to v4
      uses: actions/checkout@v4

    - name: Set up Python
      # UPDATED: Changed from v4 to v5
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run script
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python check_status.py
