name: Daily Farmer Search Check

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at 5:30 AM IST
  workflow_dispatch:

# FIX 1: Research shows setting this environment variable at the top 
# level silences the warning and forces the runner to Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      # FIX 2: Updated to v4 (minimum) or v5+ for Node 24 support
      uses: actions/checkout@v4

    - name: Set up Python
      # FIX 3: Updated to v5 or v6 which explicitly supports Node 24
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run script
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python check_status.py
